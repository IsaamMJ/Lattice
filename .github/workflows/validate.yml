name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install validator deps (PyYAML for v0.7 decision schema)
        run: pip install pyyaml
      - name: Run validate.sh
        run: |
          chmod +x scripts/validate.sh scripts/validate-decisions.sh
          ./scripts/validate.sh
